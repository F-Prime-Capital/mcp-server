services:
  fprime-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - MCP_PATH=/mcp
      - MCP_TRANSPORT=streamable-http
      - NETWORK_SEARCHER_API_URL=${NETWORK_SEARCHER_API_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
